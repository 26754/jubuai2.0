<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bgGrad)"/>
  
  <!-- Clapperboard Icon -->
  <g transform="translate(50, 42)" filter="url(#glow)">
    <!-- Clapperboard top -->
    <path d="M-28 -18 L0 -18 L6 -10 L12 -18 L28 -18 L34 -10 L34 -8 L-28 -8 Z" fill="white"/>
    <!-- Clapperboard stripes -->
    <rect x="-28" y="-18" width="6" height="8" fill="#3b82f6"/>
    <rect x="-16" y="-18" width="6" height="8" fill="#3b82f6"/>
    <rect x="-4" y="-18" width="6" height="8" fill="#3b82f6"/>
    <rect x="8" y="-18" width="6" height="8" fill="#3b82f6"/>
    <rect x="20" y="-18" width="6" height="8" fill="#3b82f6"/>
    <!-- Board body -->
    <rect x="-28" y="-8" width="62" height="38" rx="2" fill="white"/>
    <!-- Content lines -->
    <rect x="-22" y="0" width="30" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="-22" y="8" width="22" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="-22" y="16" width="26" height="3" rx="1.5" fill="#e2e8f0"/>
  </g>
  
  <!-- J letter at bottom -->
  <text x="50" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">JuBu AI</text>
</svg>
