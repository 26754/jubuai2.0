<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授权登录 - JuBu AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .consent-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 480px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }
    
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    
    .logo svg {
      width: 36px;
      height: 36px;
      fill: white;
    }
    
    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    
    .permissions {
      text-align: left;
      margin-bottom: 32px;
    }
    
    .permission-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: #f7f8fa;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    
    .permission-icon {
      width: 24px;
      height: 24px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .permission-icon svg {
      width: 14px;
      height: 14px;
      fill: #4caf50;
    }
    
    .permission-content h3 {
      font-size: 14px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    
    .permission-content p {
      font-size: 12px;
      color: #666;
    }
    
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .btn {
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .loading.show {
      display: flex;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .hidden {
      display: none !important;
    }
    
    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="consent-container">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M18 4l2 3h-3l-2-3h-2l2 3h-3l-2-3H8l2 3H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
      </svg>
    </div>
    
    <h1>授权登录 JuBu AI</h1>
    <p class="subtitle">即将通过以下方式登录您的账号</p>
    
    <div id="error-container" class="error-message hidden"></div>
    
    <div id="content">
      <div class="permissions">
        <div class="permission-item">
          <div class="permission-icon">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="permission-content">
            <h3>基本个人信息</h3>
            <p>获取您的邮箱地址和头像用于识别身份</p>
          </div>
        </div>
        
        <div class="permission-item">
          <div class="permission-icon">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          </div>
          <div class="permission-content">
            <h3>项目数据访问</h3>
            <p>读取和保存您的项目、分镜和剧本数据</p>
          </div>
        </div>
        
        <div class="permission-item">
          <div class="permission-icon">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
          </div>
          <div class="permission-content">
            <h3>数据安全</h3>
            <p>所有数据传输使用 HTTPS 加密保护</p>
          </div>
        </div>
      </div>
      
      <div class="buttons">
        <button class="btn btn-primary" id="authorize-btn">授权并登录</button>
        <button class="btn btn-secondary" id="cancel-btn">取消</button>
      </div>
    </div>
    
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>正在跳转...</p>
    </div>
  </div>

  <script>
    // 获取 URL 参数
    const params = new URLSearchParams(window.location.search);
    const provider = params.get('provider') || 'email';
    const redirectTo = params.get('redirect_to') || '/';
    const error = params.get('error');
    
    // 显示错误信息
    if (error) {
      const errorContainer = document.getElementById('error-container');
      errorContainer.textContent = decodeURIComponent(error);
      errorContainer.classList.remove('hidden');
    }
    
    // 更新页面标题
    const providerNames = {
      google: 'Google',
      github: 'GitHub',
      email: '邮箱',
    };
    document.querySelector('h1').textContent = `授权登录 JuBu AI`;
    document.querySelector('.subtitle').textContent = `即将通过 ${providerNames[provider] || provider} 登录您的账号`;
    
    // 授权按钮
    document.getElementById('authorize-btn').addEventListener('click', async () => {
      document.getElementById('content').classList.add('hidden');
      document.getElementById('loading').classList.add('show');
      
      // 触发 OAuth 流程或跳转到登录页面
      try {
        // 如果有 Supabase OAuth 配置，使用它
        const supabaseUrl = window.__SUPABASE_URL__;
        const supabaseAnonKey = window.__SUPABASE_ANON_KEY__;
        
        if (supabaseUrl && provider !== 'email') {
          // 使用 Supabase OAuth
          const redirectUrl = `${window.location.origin}/auth/callback`;
          window.location.href = `${supabaseUrl}/auth/v1/authorize?provider=${provider}&redirect_to=${encodeURIComponent(redirectUrl)}`;
        } else {
          // 回退到邮箱登录
          window.location.href = '/#login';
        }
      } catch (err) {
        console.error('Authorization error:', err);
        window.location.href = '/#login?error=' + encodeURIComponent('授权失败，请重试');
      }
    });
    
    // 取消按钮
    document.getElementById('cancel-btn').addEventListener('click', () => {
      window.location.href = '/#login';
    });
  </script>
</body>
</html>
